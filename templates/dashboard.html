<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Chocolate Sales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --indigo: #6366f1; --indigo-light: #818cf8; --indigo-bg: rgba(99,102,241,0.12);
            --sky: #0ea5e9; --sky-light: #38bdf8; --sky-bg: rgba(14,165,233,0.12);
            --bg: #0a0a12; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06);
            --text: #e8e8ef; --text-dim: #6b7280; --text-muted: #4b5563;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(20px);
        }
        .topbar .left { display: flex; align-items: center; gap: 14px; }
        .topbar .logo {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--indigo), var(--sky));
            display: flex; align-items: center; justify-content: center;
        }
        .topbar .logo svg { width: 18px; height: 18px; color: #fff; }
        .topbar h1 { font-size: 16px; font-weight: 700; color: var(--text); }
        .topbar .actions { display: flex; gap: 10px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 500;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text-dim); cursor: pointer; transition: all 0.2s;
            text-decoration: none;
        }
        .btn:hover { border-color: rgba(99,102,241,0.3); color: var(--indigo-light); background: var(--indigo-bg); }
        .btn svg { width: 14px; height: 14px; }
        .btn.primary {
            background: linear-gradient(135deg, var(--indigo), #4f46e5);
            border-color: transparent; color: #fff;
        }
        .btn.primary:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }

        .main { max-width: 1440px; margin: 0 auto; padding: 24px 32px 60px; }

        /* KPI Row */
        .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px;
            transition: all 0.25s;
        }
        .kpi-card:hover { border-color: rgba(99,102,241,0.25); transform: translateY(-2px); }
        .kpi-icon {
            width: 36px; height: 36px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .kpi-icon svg { width: 16px; height: 16px; }
        .kpi-icon.i { background: var(--indigo-bg); color: var(--indigo-light); }
        .kpi-icon.s { background: var(--sky-bg); color: var(--sky-light); }
        .kpi-info .label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
        .kpi-info .val { font-size: 22px; font-weight: 700; margin-top: 2px; }

        /* Chart grid */
        .chart-row { display: grid; gap: 16px; margin-bottom: 16px; }
        .chart-row.two { grid-template-columns: 1fr 1fr; }
        .chart-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .chart-row.full { grid-template-columns: 1fr; }
        .chart-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 22px 24px;
        }
        .chart-card h3 {
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .chart-wrap { position: relative; height: 280px; }
        .chart-wrap.tall { height: 340px; }

        /* ── Drill-down Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,8,0.75); backdrop-filter: blur(6px);
            z-index: 100; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #0d1117;
            border: 1px solid rgba(0,219,180,0.18);
            border-radius: 20px;
            width: 100%; max-width: 960px;
            max-height: 90vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 80px rgba(0,219,180,0.06), 0 32px 80px rgba(0,0,0,0.6);
            animation: modalIn 0.28s cubic-bezier(.16,1,.3,1);
            overflow: hidden;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.94) translateY(16px); }
            to   { opacity: 1; transform: scale(1)    translateY(0); }
        }

        /* Modal header */
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 16px;
        }
        .modal-header-left { display: flex; align-items: center; gap: 14px; }
        .modal-icon {
            width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
            background: linear-gradient(135deg, rgba(0,219,180,0.15), rgba(56,189,248,0.15));
            border: 1px solid rgba(0,219,180,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .modal-title-wrap .modal-title { font-size: 18px; font-weight: 700; color: #fff; }
        .modal-title-wrap .modal-sub  { font-size: 12px; color: #4b6072; margin-top: 2px; }
        .modal-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .badge-count {
            font-size: 12px; font-weight: 600; color: #8899aa;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            padding: 5px 12px; border-radius: 20px;
        }
        .btn-export-modal {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(90deg, #00dbb4, #38bdf8);
            color: #060c14; font-size: 13px; font-weight: 700;
            padding: 8px 18px; border-radius: 9px; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-export-modal:hover { opacity: 0.88; }
        .btn-export-modal svg { width: 13px; height: 13px; }
        .modal-close-btn {
            width: 34px; height: 34px; border-radius: 9px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            color: #6b7280; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close-btn:hover { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.25); }

        /* Chart area */
        .modal-chart-area {
            padding: 20px 24px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .modal-chart-wrap { position: relative; height: 200px; }

        /* Table */
        .modal-table-wrap { overflow: auto; flex: 1; }
        .modal-table {
            width: 100%; border-collapse: collapse;
            font-size: 13.5px;
        }
        .modal-table thead th {
            position: sticky; top: 0;
            background: #0d1117;
            padding: 13px 18px;
            font-size: 12px; font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            white-space: nowrap;
        }
        .modal-table thead th:nth-child(1) { color: #4b6072; width: 52px; text-align: center; }
        .modal-table thead th:nth-child(2) { color: #8899aa; }
        .modal-table thead th:nth-child(3) { color: #00dbb4; }
        .modal-table thead th:nth-child(4) { color: #818cf8; }
        .modal-table thead th:nth-child(5) { color: #38bdf8; }

        .modal-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; }
        .modal-table tbody tr:hover { background: rgba(0,219,180,0.04); }
        .modal-table tbody td {
            padding: 14px 18px; color: #c8d4e0; vertical-align: middle; white-space: nowrap;
        }
        .modal-table tbody td:nth-child(1) { text-align: center; font-size: 18px; }
        .modal-table tbody td:nth-child(2) { font-weight: 600; color: #e0eaf4; font-size: 14px; }

        /* Revenue bar cell */
        .rev-cell { display: flex; align-items: center; gap: 10px; }
        .rev-bar-bg {
            flex: 1; height: 28px; border-radius: 6px;
            background: rgba(0,219,180,0.08);
            position: relative; overflow: hidden;
            max-width: 260px; min-width: 80px;
        }
        .rev-bar-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(0,219,180,0.55), rgba(56,189,248,0.35));
            border-radius: 6px;
            transition: width 0.6s ease;
        }
        .rev-bar-label {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            font-size: 13px; font-weight: 700; color: #e0f7f4;
            white-space: nowrap;
        }

        /* Loading */
        .shimmer {
            background: linear-gradient(90deg, #15152a 25%, #1e1e38 50%, #15152a 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
            border-radius: 6px; color: transparent !important;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 900px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row.two, .chart-row.three { grid-template-columns: 1fr; }
            .topbar { padding: 12px 16px; }
            .main { padding: 16px; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="left">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            </div>
            <h1>Chocolate Sales Dashboard</h1>
        </div>
        <div class="actions">
            <a href="/" class="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                Home
            </a>
            <button class="btn primary" onclick="exportCSV()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export Data
            </button>
        </div>
    </div>

    <div class="main">
        <!-- KPIs -->
        <div class="kpi-row" id="kpi-row"></div>

        <!-- Row 1: Monthly Trend (full width) -->
        <div class="chart-row full">
            <div class="chart-card">
                <h3>Monthly Revenue & Boxes Trend</h3>
                <div class="chart-wrap tall"><canvas id="monthlyChart"></canvas></div>
            </div>
        </div>

        <!-- Row 2: Country + Category + Region -->
        <div class="chart-row three">
            <div class="chart-card">
                <h3>Revenue by Country</h3>
                <div class="chart-wrap"><canvas id="countryChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Category</h3>
                <div class="chart-wrap"><canvas id="categoryChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Region</h3>
                <div class="chart-wrap"><canvas id="regionChart"></canvas></div>
            </div>
        </div>

        <!-- Row 3: Top Products + Team -->
        <div class="chart-row two">
            <div class="chart-card">
                <h3>Top 10 Products</h3>
                <div class="chart-wrap"><canvas id="productsChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Team</h3>
                <div class="chart-wrap"><canvas id="teamChart"></canvas></div>
            </div>
        </div>

        <!-- Row 4: Salespeople + Region Trend -->
        <div class="chart-row two">
            <div class="chart-card">
                <h3>Top 10 Salespeople</h3>
                <div class="chart-wrap"><canvas id="salespeopleChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Monthly Trend by Region</h3>
                <div class="chart-wrap"><canvas id="regionTrendChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Drill-down Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <!-- Header -->
            <div class="modal-header">
                <div class="modal-header-left">
                    <div class="modal-icon" id="modal-icon">📅</div>
                    <div class="modal-title-wrap">
                        <div class="modal-title" id="modal-title">Daily Trend</div>
                        <div class="modal-sub" id="modal-sub">Day-by-day performance</div>
                    </div>
                </div>
                <div class="modal-header-right">
                    <div class="badge-count" id="modal-badge">— records</div>
                    <button class="btn-export-modal" onclick="exportModalCSV()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export CSV
                    </button>
                    <button class="modal-close-btn" onclick="closeModal()">&times;</button>
                </div>
            </div>
            <!-- Trend Chart -->
            <div class="modal-chart-area">
                <div class="modal-chart-wrap"><canvas id="modalChart"></canvas></div>
            </div>
            <!-- Table -->
            <div class="modal-table-wrap" id="modal-table-wrap">
                <table class="modal-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Revenue ($)</th>
                            <th>Boxes</th>
                            <th>Shipments</th>
                        </tr>
                    </thead>
                    <tbody id="modal-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
// ── Theme ──
const IND = '#818cf8', IND2 = '#6366f1', IND_A = 'rgba(99,102,241,0.15)';
const SKY = '#38bdf8', SKY2 = '#0ea5e9', SKY_A = 'rgba(14,165,233,0.15)';
const BAR_COLORS = [IND, SKY, IND2, SKY2, '#a78bfa', '#22d3ee'];
Chart.defaults.color = '#6b7280';
Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.font = { size: 11 };

function fmt(n) {
    if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
    return '$' + n;
}

// ── Modal state ──
let modalData = null;
let modalChartInst = null;

const CHART_ICONS = {
    month: '📅', country: '🌍', category: '🍫', product: '🍬',
    person: '👤', team: '🏆', region: '🗺️',
};
const CHART_LABELS = {
    month: 'Daily Trend', country: 'Country Breakdown', category: 'Category Breakdown',
    product: 'Product Breakdown', person: 'Salesperson Breakdown',
    team: 'Team Breakdown', region: 'Region Breakdown',
};
const MEDALS = ['🥇','🥈','🥉'];

function fmtFull(n) {
    return '$' + Number(n).toLocaleString();
}

function openDrilldown(chartType, value) {
    document.getElementById('modal').classList.add('active');
    // Set header
    document.getElementById('modal-icon').textContent = CHART_ICONS[chartType] || '📊';
    document.getElementById('modal-title').textContent = CHART_LABELS[chartType] || 'Detail';
    document.getElementById('modal-sub').textContent = 'Day-by-day performance for ' + value;
    document.getElementById('modal-badge').textContent = 'Loading…';
    document.getElementById('modal-tbody').innerHTML =
        '<tr><td colspan="5" style="text-align:center;padding:40px;color:#4b6072">Loading data…</td></tr>';

    // Clear previous chart
    if (modalChartInst) { modalChartInst.destroy(); modalChartInst = null; }

    fetch('/api/drilldown?chart=' + encodeURIComponent(chartType) + '&value=' + encodeURIComponent(value))
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
            modalData = data;
            document.getElementById('modal-badge').textContent = data.total_days + ' records';

            // ── Trend chart ──
            const ctx = document.getElementById('modalChart').getContext('2d');
            modalChartInst = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [
                        {
                            label: 'Revenue ($)',
                            data: data.revenues,
                            borderColor: '#00dbb4',
                            backgroundColor: 'rgba(0,219,180,0.08)',
                            fill: true, tension: 0.4,
                            pointRadius: 3, pointHoverRadius: 7,
                            borderWidth: 2.5, yAxisID: 'y',
                        },
                        {
                            label: 'Boxes',
                            data: data.boxes_list,
                            borderColor: '#a78bfa',
                            backgroundColor: 'rgba(167,139,250,0.06)',
                            fill: true, tension: 0.4,
                            pointRadius: 3, pointHoverRadius: 7,
                            borderWidth: 2, yAxisID: 'y1',
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { usePointStyle: true, font: { size: 12 }, color: '#8899aa' }
                        },
                    },
                    scales: {
                        x: { ticks: { color: '#4b6072', font: { size: 10 }, maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.03)' } },
                        y:  { position: 'left',  ticks: { color: '#4b6072', callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.04)' } },
                        y1: { position: 'right', ticks: { color: '#4b6072', callback: v => v.toLocaleString() }, grid: { drawOnChartArea: false } },
                    }
                }
            });

            // ── Table ──
            const maxRev = Math.max(...data.rows.map(r => r.revenue));
            const tbody = document.getElementById('modal-tbody');
            tbody.innerHTML = '';
            data.rows.forEach((row, i) => {
                const rank = i < 3 ? MEDALS[i] : (i + 1);
                const pct = maxRev > 0 ? (row.revenue / maxRev * 100).toFixed(1) : 0;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${rank}</td>
                    <td>${row.date}</td>
                    <td>
                        <div class="rev-cell">
                            <div class="rev-bar-bg">
                                <div class="rev-bar-fill" style="width:${pct}%"></div>
                                <span class="rev-bar-label">${fmtFull(row.revenue)}</span>
                            </div>
                        </div>
                    </td>
                    <td>${Number(row.boxes).toLocaleString()}</td>
                    <td>${Number(row.shipments).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(err => {
            document.getElementById('modal-tbody').innerHTML =
                `<tr><td colspan="5" style="text-align:center;padding:40px;color:#f87171">Error: ${err.message}</td></tr>`;
            document.getElementById('modal-badge').textContent = 'Error';
        });
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    if (modalChartInst) { modalChartInst.destroy(); modalChartInst = null; }
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function clickOpts(chartType) {
    return {
        onClick: (evt, elements, chart) => {
            if (!elements.length) return;
            const idx = elements[0].index;
            const label = chart.data.labels[idx];
            openDrilldown(chartType, label);
        },
        onHover: (evt, elements) => {
            evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        }
    };
}

// ── KPIs ──
const kpiConfig = [
    { id: 'revenue', label: 'Total Revenue', icon: 'dollar', cls: 'i' },
    { id: 'boxes', label: 'Boxes Sold', icon: 'box', cls: 's' },
    { id: 'shipments', label: 'Shipments', icon: 'truck', cls: 'i' },
    { id: 'people', label: 'Salespeople', icon: 'users', cls: 's' },
    { id: 'avg', label: 'Avg / Shipment', icon: 'pulse', cls: 'i' },
];
const icons = {
    dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="22" height="18" rx="2"/><path d="M1 9h22"/></svg>',
    truck: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
    pulse: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
};

// Render KPI skeleton
document.getElementById('kpi-row').innerHTML = kpiConfig.map(k =>
    `<div class="kpi-card"><div class="kpi-icon ${k.cls}">${icons[k.icon]}</div>` +
    `<div class="kpi-info"><div class="label">${k.label}</div>` +
    `<div class="val shimmer" id="kpi-${k.id}">$000.0M</div></div></div>`
).join('');

fetch('/api/summary').then(r => r.json()).then(d => {
    const s = (id, v) => { const el = document.getElementById('kpi-'+id); el.textContent = v; el.classList.remove('shimmer'); };
    s('revenue', fmt(d.total_revenue));

// ── Export Functions ──
function exportCSV() {
    // Export summary report
    fetch('/api/summary').then(r => r.json()).then(d => {
        let csv = 'Metric,Value\n';
        csv += `Total Revenue,${d.total_revenue}\n`;
        csv += `Total Boxes,${d.total_boxes}\n`;
        csv += `Total Shipments,${d.total_shipments}\n`;
        csv += `Salespeople,${d.total_salespeople}\n`;
        csv += `Avg Revenue Per Shipment,${d.avg_revenue_per_shipment}\n`;
        csv += `Top Product,${d.top_product}\n`;
        csv += `Top Country,${d.top_country}\n`;
        downloadCSV(csv, 'chocolate_sales_summary.csv');
    });
}

function exportModalCSV() {
    if (!modalData || !modalData.rows.length) return;
    let csv = 'Date,Revenue,Boxes,Shipments\n';
    modalData.rows.forEach(row => {
        csv += `${row.date},${row.revenue},${row.boxes},${row.shipments}\n`;
    });
    downloadCSV(csv, 'drilldown_' + (modalData.label || 'export').replace(/\s+/g,'_') + '.csv');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}
