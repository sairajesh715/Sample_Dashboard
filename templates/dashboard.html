<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Chocolate Sales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --indigo: #6366f1; --indigo-light: #818cf8; --indigo-bg: rgba(99,102,241,0.12);
            --sky: #0ea5e9; --sky-light: #38bdf8; --sky-bg: rgba(14,165,233,0.12);
            --bg: #0a0a12; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06);
            --text: #e8e8ef; --text-dim: #6b7280; --text-muted: #4b5563;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(20px);
        }
        .topbar .left { display: flex; align-items: center; gap: 14px; }
        .topbar .logo {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--indigo), var(--sky));
            display: flex; align-items: center; justify-content: center;
        }
        .topbar .logo svg { width: 18px; height: 18px; color: #fff; }
        .topbar h1 { font-size: 16px; font-weight: 700; color: var(--text); }
        .topbar .actions { display: flex; gap: 10px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 500;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text-dim); cursor: pointer; transition: all 0.2s;
            text-decoration: none;
        }
        .btn:hover { border-color: rgba(99,102,241,0.3); color: var(--indigo-light); background: var(--indigo-bg); }
        .btn svg { width: 14px; height: 14px; }
        .btn.primary {
            background: linear-gradient(135deg, var(--indigo), #4f46e5);
            border-color: transparent; color: #fff;
        }
        .btn.primary:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }

        .main { max-width: 1440px; margin: 0 auto; padding: 24px 32px 60px; }

        /* KPI Row */
        .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
        .kpi-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px;
            transition: all 0.25s;
        }
        .kpi-card:hover { border-color: rgba(99,102,241,0.25); transform: translateY(-2px); }
        .kpi-icon {
            width: 36px; height: 36px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .kpi-icon svg { width: 16px; height: 16px; }
        .kpi-icon.i { background: var(--indigo-bg); color: var(--indigo-light); }
        .kpi-icon.s { background: var(--sky-bg); color: var(--sky-light); }
        .kpi-info .label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
        .kpi-info .val { font-size: 22px; font-weight: 700; margin-top: 2px; }

        /* Chart grid */
        .chart-row { display: grid; gap: 16px; margin-bottom: 16px; }
        .chart-row.two { grid-template-columns: 1fr 1fr; }
        .chart-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .chart-row.full { grid-template-columns: 1fr; }
        .chart-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 22px 24px;
        }
        .chart-card h3 {
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .chart-wrap { position: relative; height: 280px; }
        .chart-wrap.tall { height: 340px; }

        /* Drill-down Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #12121e; border: 1px solid var(--border);
            border-radius: 18px; width: 90%; max-width: 900px;
            max-height: 80vh; display: flex; flex-direction: column;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .modal-header h2 { font-size: 16px; font-weight: 700; }
        .modal-header .info { font-size: 12px; color: var(--text-dim); }
        .modal-close {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.3); }
        .modal-body { overflow: auto; padding: 0; flex: 1; }
        .modal-body table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .modal-body th {
            position: sticky; top: 0; background: #181828;
            padding: 12px 16px; text-align: left;
            font-weight: 600; color: var(--indigo-light);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .modal-body td {
            padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text); white-space: nowrap;
        }
        .modal-body tr:hover td { background: rgba(99,102,241,0.04); }
        .modal-footer {
            padding: 14px 24px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end;
        }

        /* Loading */
        .shimmer {
            background: linear-gradient(90deg, #15152a 25%, #1e1e38 50%, #15152a 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
            border-radius: 6px; color: transparent !important;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 900px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row.two, .chart-row.three { grid-template-columns: 1fr; }
            .topbar { padding: 12px 16px; }
            .main { padding: 16px; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="left">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            </div>
            <h1>Chocolate Sales Dashboard</h1>
        </div>
        <div class="actions">
            <a href="/" class="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                Home
            </a>
            <button class="btn primary" onclick="exportCSV()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export Data
            </button>
        </div>
    </div>

    <div class="main">
        <!-- KPIs -->
        <div class="kpi-row" id="kpi-row"></div>

        <!-- Row 1: Monthly Trend (full width) -->
        <div class="chart-row full">
            <div class="chart-card">
                <h3>Monthly Revenue & Boxes Trend</h3>
                <div class="chart-wrap tall"><canvas id="monthlyChart"></canvas></div>
            </div>
        </div>

        <!-- Row 2: Country + Category + Region -->
        <div class="chart-row three">
            <div class="chart-card">
                <h3>Revenue by Country</h3>
                <div class="chart-wrap"><canvas id="countryChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Category</h3>
                <div class="chart-wrap"><canvas id="categoryChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Region</h3>
                <div class="chart-wrap"><canvas id="regionChart"></canvas></div>
            </div>
        </div>

        <!-- Row 3: Top Products + Team -->
        <div class="chart-row two">
            <div class="chart-card">
                <h3>Top 10 Products</h3>
                <div class="chart-wrap"><canvas id="productsChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Revenue by Team</h3>
                <div class="chart-wrap"><canvas id="teamChart"></canvas></div>
            </div>
        </div>

        <!-- Row 4: Salespeople + Region Trend -->
        <div class="chart-row two">
            <div class="chart-card">
                <h3>Top 10 Salespeople</h3>
                <div class="chart-wrap"><canvas id="salespeopleChart"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Monthly Trend by Region</h3>
                <div class="chart-wrap"><canvas id="regionTrendChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Drill-down Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h2 id="modal-title">Detail View</h2>
                    <div class="info" id="modal-info"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn" onclick="exportModalCSV()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export Table
                </button>
                <button class="btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

<script>
// ── Theme ──
const IND = '#818cf8', IND2 = '#6366f1', IND_A = 'rgba(99,102,241,0.15)';
const SKY = '#38bdf8', SKY2 = '#0ea5e9', SKY_A = 'rgba(14,165,233,0.15)';
const BAR_COLORS = [IND, SKY, IND2, SKY2, '#a78bfa', '#22d3ee'];
Chart.defaults.color = '#6b7280';
Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.font = { size: 11 };

function fmt(n) {
    if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
    return '$' + n;
}

// ── Modal state ──
let modalData = { columns: [], rows: [] };

function openDrilldown(chart, value) {
    const m = document.getElementById('modal');
    document.getElementById('modal-title', 'Loading...');
    document.getElementById('modal-body').innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280">Loading data...</div>';
    m.classList.add('active');
    document.getElementById('modal-title').textContent = value + ' — Detail';

    fetch('/api/drilldown?chart=' + encodeURIComponent(chart) + '&value=' + encodeURIComponent(value))
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
            modalData = data;
            document.getElementById('modal-info').textContent =
                'Showing ' + data.shown + ' of ' + data.total_rows + ' records (top by amount)';
            let html = '<table><thead><tr>';
            data.columns.forEach(c => html += '<th>' + c + '</th>');
            html += '</tr></thead><tbody>';
            data.rows.forEach(row => {
                html += '<tr>';
                row.forEach((cell, i) => {
                    if (data.columns[i] === 'Amount' || data.columns[i] === 'Boxes')
                        html += '<td style="text-align:right;font-variant-numeric:tabular-nums">' +
                            (typeof cell === 'number' ? cell.toLocaleString() : cell) + '</td>';
                    else
                        html += '<td>' + (cell === null ? '' : cell) + '</td>';
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('modal-body').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('modal-body').innerHTML =
                '<div style="padding:40px;text-align:center;color:#f87171">Error loading data: ' + err.message + '</div>';
        });
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function clickOpts(chartType) {
    return {
        onClick: (evt, elements, chart) => {
            if (!elements.length) return;
            const idx = elements[0].index;
            const label = chart.data.labels[idx];
            openDrilldown(chartType, label);
        },
        onHover: (evt, elements) => {
            evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        }
    };
}

// ── KPIs ──
const kpiConfig = [
    { id: 'revenue', label: 'Total Revenue', icon: 'dollar', cls: 'i' },
    { id: 'boxes', label: 'Boxes Sold', icon: 'box', cls: 's' },
    { id: 'shipments', label: 'Shipments', icon: 'truck', cls: 'i' },
    { id: 'people', label: 'Salespeople', icon: 'users', cls: 's' },
    { id: 'avg', label: 'Avg / Shipment', icon: 'pulse', cls: 'i' },
];
const icons = {
    dollar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="22" height="18" rx="2"/><path d="M1 9h22"/></svg>',
    truck: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
    pulse: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
};

// Render KPI skeleton
document.getElementById('kpi-row').innerHTML = kpiConfig.map(k =>
    `<div class="kpi-card"><div class="kpi-icon ${k.cls}">${icons[k.icon]}</div>` +
    `<div class="kpi-info"><div class="label">${k.label}</div>` +
    `<div class="val shimmer" id="kpi-${k.id}">$000.0M</div></div></div>`
).join('');

fetch('/api/summary').then(r => r.json()).then(d => {
    const s = (id, v) => { const el = document.getElementById('kpi-'+id); el.textContent = v; el.classList.remove('shimmer'); };
    s('revenue', fmt(d.total_revenue));
    s('boxes', d.total_boxes.toLocaleString());
    s('shipments', d.total_shipments.toLocaleString());
    s('people', d.total_salespeople);
    s('avg', fmt(d.avg_revenue_per_shipment));
});

// ── Charts ──

// 1. Monthly Trend
fetch('/api/revenue-by-month').then(r => r.json()).then(data => {
    new Chart(document.getElementById('monthlyChart'), {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                label: 'Revenue', data: data.revenue,
                borderColor: IND, backgroundColor: IND_A,
                fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 7, yAxisID: 'y',
            }, {
                label: 'Boxes', data: data.boxes,
                borderColor: SKY, backgroundColor: SKY_A,
                fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 7, yAxisID: 'y1',
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            ...clickOpts('month'),
            scales: {
                y:  { position: 'left',  ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } },
                y1: { position: 'right', ticks: { callback: v => v.toLocaleString() }, grid: { drawOnChartArea: false } },
            },
        }
    });
});

// 2. Country (doughnut)
fetch('/api/revenue-by-country').then(r => r.json()).then(data => {
    const shades = data.labels.map((_, i) => {
        const t = i / Math.max(data.labels.length - 1, 1);
        return `hsl(${234 + t * 30}, ${70 + t * 10}%, ${62 + t * 10}%)`;
    });
    new Chart(document.getElementById('countryChart'), {
        type: 'doughnut',
        data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: shades, borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
            ...clickOpts('country'),
            plugins: { legend: { position: 'right' } } }
    });
});

// 3. Category (doughnut)
fetch('/api/revenue-by-category').then(r => r.json()).then(data => {
    new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: [IND, SKY, '#a78bfa'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
            ...clickOpts('category'),
            plugins: { legend: { position: 'right' } } }
    });
});

// 4. Region (bar)
fetch('/api/revenue-by-region').then(r => r.json()).then(data => {
    new Chart(document.getElementById('regionChart'), {
        type: 'bar',
        data: { labels: data.labels, datasets: [{
            label: 'Revenue', data: data.values,
            backgroundColor: data.labels.map((_, i) => i % 2 === 0 ? IND : SKY),
            borderRadius: 6, maxBarThickness: 40,
        }] },
        options: { responsive: true, maintainAspectRatio: false,
            ...clickOpts('region'),
            plugins: { legend: { display: false } },
            scales: { y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
    });
});

// 5. Top Products (horizontal bar)
fetch('/api/top-products').then(r => r.json()).then(data => {
    new Chart(document.getElementById('productsChart'), {
        type: 'bar',
        data: { labels: data.labels, datasets: [{
            label: 'Revenue', data: data.values,
            backgroundColor: data.labels.map((_, i) => i % 2 === 0 ? IND : SKY),
            borderRadius: 5, maxBarThickness: 24,
        }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            ...clickOpts('product'),
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
    });
});

// 6. Team (bar)
fetch('/api/revenue-by-team').then(r => r.json()).then(data => {
    new Chart(document.getElementById('teamChart'), {
        type: 'bar',
        data: { labels: data.labels, datasets: [{
            label: 'Revenue', data: data.values,
            backgroundColor: data.labels.map((_, i) => i % 2 === 0 ? IND : SKY),
            borderRadius: 6, maxBarThickness: 40,
        }] },
        options: { responsive: true, maintainAspectRatio: false,
            ...clickOpts('team'),
            plugins: { legend: { display: false } },
            scales: { y: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
    });
});

// 7. Salespeople (horizontal bar)
fetch('/api/top-salespeople').then(r => r.json()).then(data => {
    new Chart(document.getElementById('salespeopleChart'), {
        type: 'bar',
        data: { labels: data.labels, datasets: [{
            label: 'Revenue', data: data.values,
            backgroundColor: data.labels.map((_, i) => i % 2 === 0 ? IND : SKY),
            borderRadius: 5, maxBarThickness: 24,
        }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
            ...clickOpts('person'),
            plugins: { legend: { display: false } },
            scales: { x: { ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
    });
});

// 8. Region Trend (stacked area)
fetch('/api/monthly-trend-by-region').then(r => r.json()).then(data => {
    const regionColors = { 'APAC': IND, 'Americas': SKY, 'Europe': '#a78bfa' };
    const regionAlpha = { 'APAC': IND_A, 'Americas': SKY_A, 'Europe': 'rgba(167,139,250,0.15)' };
    const datasets = Object.entries(data.datasets).map(([region, values]) => ({
        label: region, data: values,
        borderColor: regionColors[region] || IND,
        backgroundColor: regionAlpha[region] || IND_A,
        fill: true, tension: 0.4,
    }));
    new Chart(document.getElementById('regionTrendChart'), {
        type: 'line',
        data: { labels: data.labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            scales: {
                y: { stacked: true, ticks: { callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.03)' } },
                x: { grid: { color: 'rgba(255,255,255,0.03)' } },
            },
            plugins: { legend: { position: 'top' } },
        }
    });
});

// ── Export Functions ──
function exportCSV() {
    // Export summary report
    fetch('/api/summary').then(r => r.json()).then(d => {
        let csv = 'Metric,Value\n';
        csv += `Total Revenue,${d.total_revenue}\n`;
        csv += `Total Boxes,${d.total_boxes}\n`;
        csv += `Total Shipments,${d.total_shipments}\n`;
        csv += `Salespeople,${d.total_salespeople}\n`;
        csv += `Avg Revenue Per Shipment,${d.avg_revenue_per_shipment}\n`;
        csv += `Top Product,${d.top_product}\n`;
        csv += `Top Country,${d.top_country}\n`;
        downloadCSV(csv, 'chocolate_sales_summary.csv');
    });
}

function exportModalCSV() {
    if (!modalData.columns.length) return;
    let csv = modalData.columns.join(',') + '\n';
    modalData.rows.forEach(row => {
        csv += row.map(cell => {
            const s = String(cell);
            return s.includes(',') ? '"' + s + '"' : s;
        }).join(',') + '\n';
    });
    downloadCSV(csv, 'drilldown_export.csv');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}
</script>
